name: Deploy TLC Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'

jobs:

  # ── TEST ENVIRONMENT ──────────────────────────────────────────────────────
  # Deploys to test.timothystl.org on any non-main branch push.
  # Production is never touched until code merges to main.

  deploy-test-site:
    name: Deploy test site (test.timothystl.org)
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy test site worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-test-site.toml

      - name: Create D1 database (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          OUTPUT=$(wrangler d1 create tlc-newsletter-db 2>&1 || true)
          echo "$OUTPUT"

          DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id = "\K[^"]+' || true)

          if [ -z "$DB_ID" ]; then
            LIST_OUTPUT=$(wrangler d1 list 2>&1)
            echo "$LIST_OUTPUT"
            DB_ID=$(echo "$LIST_OUTPUT" | grep -i 'tlc-newsletter-db' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not get database ID"
            exit 1
          fi

          echo "Database ID: $DB_ID"
          sed -i "s/REPLACE_WITH_DATABASE_ID/$DB_ID/" wrangler.toml

      - name: Create R2 image bucket (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler r2 bucket create tlc-news-images 2>&1 || true

      - name: Deploy admin worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Done
        run: |
          echo ""
          echo "Test site deployed!"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Worker : timothystl-test-site"
          echo "  URL    : https://test.timothystl.org"
          echo ""
          echo "First time only: add custom domain in Cloudflare Dashboard:"
          echo "  timothystl-test-site  →  test.timothystl.org"
          echo ""

  # ── PRODUCTION ────────────────────────────────────────────────────────────
  # Deploys all four production workers on push to main or manual trigger.

  deploy-site:
    name: Deploy main site (timothystl.org)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy main site worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-site.toml

  deploy-admin:
    name: Deploy newsletter admin (admin.timothystl.org)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          OUTPUT=$(wrangler d1 create tlc-newsletter-db 2>&1 || true)
          echo "$OUTPUT"

          # Parse database_id from text output (format: database_id = "xxxx")
          DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id = "\K[^"]+' || true)

          if [ -z "$DB_ID" ]; then
            # Database may already exist — list and grep for it
            LIST_OUTPUT=$(wrangler d1 list 2>&1)
            echo "$LIST_OUTPUT"
            DB_ID=$(echo "$LIST_OUTPUT" | grep -i 'tlc-newsletter-db' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not get database ID"
            exit 1
          fi

          echo "Database ID: $DB_ID"
          sed -i "s/REPLACE_WITH_DATABASE_ID/$DB_ID/" wrangler.toml
          echo "Updated wrangler.toml"

      - name: Create R2 image bucket (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler r2 bucket create tlc-news-images 2>&1 || true

      - name: Deploy admin worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

  deploy-links:
    name: Deploy links page (links.timothystl.org)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy links worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-links.toml

  deploy-volunteer:
    name: Deploy volunteer sign-up (volunteer.timothystl.org)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy volunteer worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-volunteer.toml

  done:
    name: All done
    needs: [deploy-site, deploy-admin, deploy-links, deploy-volunteer]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: |
          echo ""
          echo "All production workers deployed!"
          echo ""
          echo "First time only: add custom domains in Cloudflare Dashboard:"
          echo "  timothystl-site       →  timothystl.org"
          echo "  tlc-newsletter-admin  →  admin.timothystl.org"
          echo "  tlc-links             →  links.timothystl.org"
          echo "  tlc-volunteer         →  volunteer.timothystl.org"
          echo "  timothystl-test-site  →  test.timothystl.org"
          echo ""
