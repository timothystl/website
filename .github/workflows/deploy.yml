name: Deploy TLC Website

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-site:
    name: Deploy main site (timothystl.org)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy main site worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-site.toml

  deploy-admin:
    name: Deploy newsletter admin (admin.timothystl.org)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          OUTPUT=$(wrangler d1 create tlc-newsletter-db 2>&1 || true)
          echo "$OUTPUT"

          # Parse database_id from text output (format: database_id = "xxxx")
          DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id = "\K[^"]+' || true)

          if [ -z "$DB_ID" ]; then
            # Database may already exist — list and grep for it
            LIST_OUTPUT=$(wrangler d1 list 2>&1)
            echo "$LIST_OUTPUT"
            DB_ID=$(echo "$LIST_OUTPUT" | grep -i 'tlc-newsletter-db' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
          fi

          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not get database ID"
            exit 1
          fi

          echo "Database ID: $DB_ID"
          sed -i "s/REPLACE_WITH_DATABASE_ID/$DB_ID/" wrangler.toml
          echo "Updated wrangler.toml"

      - name: Deploy admin worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

  deploy-links:
    name: Deploy NFC links page (links.timothystl.org)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy links worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler-links.toml

      - name: Done
        run: |
          echo ""
          echo "Links worker deployed!"
          echo ""
          echo "If first time setup, add custom domain in Cloudflare Dashboard:"
          echo "  tlc-links → links.timothystl.org"

  done:
    name: All done
    needs: [deploy-site, deploy-admin, deploy-links]
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: |
          echo ""
          echo "All workers deployed!"
          echo ""
          echo "If first time setup, add custom domains in Cloudflare Dashboard:"
          echo "  timothystl-site → timothystl.org"
          echo "  tlc-newsletter-admin → admin.timothystl.org"
          echo "  tlc-links → links.timothystl.org"
